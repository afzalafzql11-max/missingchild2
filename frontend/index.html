
<!DOCTYPE html>
<html>
<head>
<title>Missing Link System</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.container{
width:400px;
margin:auto;
margin-top:60px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input,button{
width:90%;
padding:10px;
margin:8px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.page{
display:none;
}

</style>

</head>

<body>

<!-- SIGNUP PAGE -->

<div class="container page" id="signup">
<h2>Create Account</h2>

<input type="text" id="su_name" placeholder="Name">

<input type="email" id="su_email" placeholder="Email">

<input type="password" id="su_pass" placeholder="Password">

<button onclick="signup()">Signup</button>

<p>Already have account?</p>

<button onclick="showPage('login')">Login</button>
</div>


<!-- LOGIN PAGE -->

<div class="container page" id="login">

<h2>Login</h2>

<input type="email" id="li_email" placeholder="Email">

<input type="password" id="li_pass" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account?</p>

<button onclick="showPage('signup')">Create Account</button>

</div>


<!-- DASHBOARD -->

<div class="container page" id="dashboard">

<h2>Missing Link Dashboard</h2>

<button onclick="showPage('register')">
Register Missing Child
</button>

<button onclick="showPage('crosscheck')">
Cross Check Photo
</button>

</div>


<!-- REGISTER CHILD -->

<div class="container page" id="register">

<h2>Register Missing Child</h2>

<input type="text" id="child_name" placeholder="Child Name">

<input type="number" id="child_age" placeholder="Age">

<input type="text" id="child_place" placeholder="Missing Place">

<input type="file" id="child_photo">

<button onclick="registerChild()">Submit</button>

<button onclick="showPage('dashboard')">Back</button>

</div>


<!-- CROSS CHECK -->

<div class="container page" id="crosscheck">

<h2>Cross Check Photo</h2>

<input type="file" id="check_photo">

<button onclick="crossCheck()">Check Match</button>

<button onclick="showPage('dashboard')">Back</button>

</div>


<!-- RESULT PAGE -->

<div class="container page" id="result">

<h2 id="result_text"></h2>

<div id="family_details"></div>

<button onclick="showPage('dashboard')">Back to Dashboard</button>

</div>



<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

showPage("login")


/* SIGNUP */

function signup(){

fetch("/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("su_name").value,
email:document.getElementById("su_email").value,
password:document.getElementById("su_pass").value

})

})

.then(res=>res.json())
.then(data=>{

alert(data.message)
showPage("login")

})

}


/* LOGIN */

function login(){

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("li_email").value,
password:document.getElementById("li_pass").value

})

})

.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

showPage("dashboard")

}else{

alert("Login Failed")

}

})

}



/* REGISTER CHILD */

function registerChild(){

let formData=new FormData()

formData.append("name",
document.getElementById("child_name").value)

formData.append("age",
document.getElementById("child_age").value)

formData.append("place",
document.getElementById("child_place").value)

formData.append("photo",
document.getElementById("child_photo").files[0])


fetch("/register_child",{

method:"POST",

body:formData

})

.then(res=>res.json())
.then(data=>{

alert(data.message)

})

}



/* CROSS CHECK */

function crossCheck(){

let formData=new FormData()

formData.append("photo",
document.getElementById("check_photo").files[0])


fetch("/crosscheck",{

method:"POST",

body:formData

})

.then(res=>res.json())
.then(data=>{

showPage("result")

if(data.status=="found"){

document.getElementById("result_text").innerHTML="MATCH FOUND"

document.getElementById("family_details").innerHTML=

"Name: "+data.name+"<br>"+
"Age: "+data.age+"<br>"+
"Place: "+data.place

}

else{

document.getElementById("result_text").innerHTML="NOT FOUND"

}

})

}

</script>

</body>
</html>
